<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Kurssi-AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 600px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .header {
      padding: 15px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      background: #ffffff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      margin-bottom: 15px;
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-line;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
    }

    .assistant {
      background: #e9ecef;
      color: black;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    Kurssi-AI
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="kysymys" placeholder="Kysy mitä tahansa kurssista...">
    <button onclick="lahetaKysymys()">Lähetä</button>
  </div>

</div>

<script>

let historia = [];

function lisaaViesti(rooli, teksti) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("message");
  div.classList.add(rooli);

  div.innerText = teksti;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function lahetaKysymys() {
  const input = document.getElementById("kysymys");
  const kysymys = input.value;

  if (!kysymys.trim()) return;

  lisaaViesti("user", kysymys);
  input.value = "";

  const response = await fetch("/kysy", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      kysymys: kysymys,
      historia: historia
    })
  });

  const data = await response.json();

  if (data.vastaus) {
    lisaaViesti("assistant", data.vastaus);

    historia.push({ role: "user", content: kysymys });
    historia.push({ role: "assistant", content: data.vastaus });
  } else {
    lisaaViesti("assistant", "Virhe: " + data.virhe);
  }
}

// Enter-näppäin toimii
document.getElementById("kysymys").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    lahetaKysymys();
  }
});

</script>

</body>
</html>
