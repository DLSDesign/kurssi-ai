<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Kurssi-AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 700px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: 0 0 12px rgba(0,0,0,0.08);
    }

    .header {
      padding: 18px;
      font-weight: bold;
      font-size: 20px;
      border-bottom: 1px solid #ddd;
      background: #ffffff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .welcome {
      background: #f0f6ff;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 18px;
    }

    .welcome h2 {
      margin-top: 0;
    }

    .suggestions button {
      margin: 6px 6px 0 0;
      background: white;
      color: #0056b3;
      border: 1px solid #bcd7ff;
      border-radius: 20px;
      padding: 8px 12px;
    }

    .message {
      margin-bottom: 16px;
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: normal;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
    }

    .assistant {
      background: #e9ecef;
      color: black;
      margin-right: auto;
    }

    .typing {
      font-style: italic;
      color: #666;
      background: #f1f1f1;
    }

    ol {
      padding-left: 24px;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    li {
      margin-bottom: 8px;
    }

    .source-video {
      margin-top: 10px;
      padding: 8px;
      background: #e7f3ff;
      border-radius: 6px;
    }

    .source-note {
      margin-top: 5px;
      padding: 8px;
      background: #f1f1f1;
      border-radius: 6px;
    }

    .ui-term {
      font-weight: bold;
      background: #fff3cd;
      padding: 1px 4px;
      border-radius: 4px;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .send-button {
      padding: 14px 22px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .send-button:hover {
      background: #0056b3;
    }
.programs button {
  margin: 6px 6px 0 0;
  background: #f8f9fa;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 20px;
  padding: 8px 12px;
}

.selected-program {
  font-size: 14px;
  color: #555;
}
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    Kurssi-AI
  </div>

  <div id="chat">
    <div id="welcome" class="welcome">
      <h2>Hei 👋</h2>
      <p>Kysy apua Wordiin, Exceliin tai PowerPointiin liittyvissä kurssin asioissa.</p>
      <p>Voit kirjoittaa oman kysymyksen tai aloittaa valmiilla esimerkillä.</p>

      <div class="suggestions">
        <button onclick="lahetaValmisKysymys('Miten jaan tiedoston?')">Miten jaan tiedoston?</button>
        <button onclick="lahetaValmisKysymys('Miten valitsen sarakkeen Excelissä?')">Miten valitsen sarakkeen Excelissä?</button>
        <button onclick="lahetaValmisKysymys('Miten kopioin tietoja?')">Miten kopioin tietoja?</button>
        <button onclick="lahetaValmisKysymys('Miten lisään kuvan PowerPointissa?')">Miten lisään kuvan PowerPointissa?</button>
<p><strong>Valitse ohjelma, jota kysymyksesi koskee:</strong></p>

<div class="programs">
  <button onclick="valitseOhjelma('Word')">Word</button>
  <button onclick="valitseOhjelma('Excel')">Excel</button>
  <button onclick="valitseOhjelma('PowerPoint')">PowerPoint</button>
  <button onclick="valitseOhjelma('')">En tiedä / kaikki</button>
</div>

<p id="valittuOhjelma" class="selected-program">Ohjelmaa ei ole valittu.</p>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input id="kysymys" placeholder="Kysy mitä tahansa kurssista...">
    <button class="send-button" onclick="lahetaKysymys()">Lähetä</button>
  </div>

</div>

<script>
let historia = [];
let valittuOhjelma = "";

function valitseOhjelma(ohjelma) {
  valittuOhjelma = ohjelma;

  const teksti = ohjelma
    ? "Valittu ohjelma: " + ohjelma
    : "Ohjelmaa ei ole rajattu.";

  document.getElementById("valittuOhjelma").innerText = teksti;
}
function piilotaAloitusruutu() {
  const welcome = document.getElementById("welcome");
  if (welcome) {
    welcome.remove();
  }
}

function lisaaViesti(rooli, teksti, id = null) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("message");
  div.classList.add(rooli);

  if (id) {
    div.id = id;
  }

  if (rooli === "assistant") {
    div.innerHTML = muotoileVastaus(teksti);
  } else {
    div.innerText = teksti;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function naytaKirjoittaa() {
  lisaaViesti("assistant", "AI kirjoittaa...", "typing");
  document.getElementById("typing").classList.add("typing");
}

function poistaKirjoittaa() {
  const typing = document.getElementById("typing");
  if (typing) {
    typing.remove();
  }
}

function korostaPainikkeet(teksti) {
  const termit = [
    "Jaa",
    "Kopioi",
    "Liitä",
    "Tallenna",
    "Avaa",
    "Lisää",
    "Muokkaa",
    "Poista",
    "Lataa",
    "Tiedosto",
    "Aloitus",
    "Näytä",
    "Korvaa",
    "Ctrl + C",
    "Ctrl + V",
    "Ctrl + A",
    "Control A"
  ];

  termit.forEach(termi => {
    const regex = new RegExp(`\\b${termi}\\b`, "g");
    teksti = teksti.replace(regex, `<span class="ui-term">${termi}</span>`);
  });

  return teksti;
}

function muotoileVastaus(teksti) {
  let rivit = teksti.split("\n");
  let html = "";
  let listaKaynnissa = false;

  rivit.forEach(rivi => {
    rivi = rivi.trim();

    if (!rivi) {
      return;
    }

    const numeroMatch = rivi.match(/^\d+\.\s/);

    if (numeroMatch) {
      if (!listaKaynnissa) {
        html += "<ol>";
        listaKaynnissa = true;
      }

      let kohta = rivi.replace(/^\d+\.\s/, "");
      kohta = korostaPainikkeet(kohta);

      html += `<li>${kohta}</li>`;
    } else {
      if (listaKaynnissa) {
        html += "</ol>";
        listaKaynnissa = false;
      }

      if (rivi.startsWith("Löytyy videosta:")) {
        html += `<div class="source-video">🎥 ${rivi.replace("Löytyy videosta:", "").trim()}</div>`;
      }
      else if (rivi.startsWith("Lisäohje:")) {
        html += `<div class="source-note">📘 ${rivi.replace("Lisäohje:", "").trim()}</div>`;
      }
      else {
        let muotoiltu = rivi;
        muotoiltu = korostaPainikkeet(muotoiltu);
        html += `<div>${muotoiltu}</div>`;
      }
    }
  });

  if (listaKaynnissa) {
    html += "</ol>";
  }

  return html;
}

async function lahetaValmisKysymys(kysymys) {
  document.getElementById("kysymys").value = kysymys;
  await lahetaKysymys();
}

async function lahetaKysymys() {
  const input = document.getElementById("kysymys");
  const kysymys = input.value;

  if (!kysymys.trim()) return;

  piilotaAloitusruutu();
  lisaaViesti("user", kysymys);
  input.value = "";

  naytaKirjoittaa();

  try {
    const response = await fetch("/kysy", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
body: JSON.stringify({
  kysymys: valittuOhjelma
    ? `Ohjelma: ${valittuOhjelma}. Kysymys: ${kysymys}`
    : kysymys,
  historia: historia
})
    });

    const data = await response.json();

    poistaKirjoittaa();

    if (data.vastaus) {
      lisaaViesti("assistant", data.vastaus);

      historia.push({ role: "user", content: kysymys });
      historia.push({ role: "assistant", content: data.vastaus });
    } else {
      lisaaViesti("assistant", "Virhe: " + data.virhe);
    }
  } catch (error) {
    poistaKirjoittaa();
    lisaaViesti("assistant", "Yhteydessä tapahtui virhe. Yritä hetken kuluttua uudelleen.");
  }
}

document.getElementById("kysymys").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    lahetaKysymys();
  }
});
</script>

</body>
</html>
