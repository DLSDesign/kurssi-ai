<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kurssi-AI</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f8fa;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  overflow: hidden;
  color: #1f2933;
}

.container {
  width: 100%;
  max-width: 680px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  overflow: hidden;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid #edf0f3;
  background: #ffffff;
  flex-shrink: 0;
}

.header-title {
  font-size: 16px;
  font-weight: 600;
}

#headerOhjelma {
  font-size: 13px;
  color: #6b7280;
  margin-top: 2px;
}

.clear-button {
  background: #ffffff;
  border: 1px solid #d9dee5;
  color: #4b5563;
  border-radius: 999px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 13px;
}

.clear-button:hover {
  background: #f3f4f6;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 22px;
  background: #fbfcfd;
  min-height: 0;
}

.welcome {
  background: #ffffff;
  border: 1px solid #e8edf3;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.welcome.hide {
  opacity: 0;
  transform: translateY(-8px);
}

.welcome h2 {
  margin: 0 0 8px 0;
  font-size: 20px;
}

.welcome p {
  margin: 8px 0 12px 0;
  color: #4b5563;
  line-height: 1.45;
}

.programs,
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.programs button,
.suggestions button {
  background: #ffffff;
  color: #1f4f82;
  border: 1px solid #d7e6f7;
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-size: 13px;
}

.programs button:hover,
.suggestions button:hover {
  background: #f0f7ff;
}

.selected-program {
  font-size: 13px;
  color: #6b7280;
  margin-top: 10px;
}

.message {
  margin-bottom: 16px;
  max-width: 88%;
  padding: 14px 16px;
  border-radius: 18px;
  line-height: 1.55;
  font-size: 14px;
}

.user {
  background: #2563eb;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

.assistant {
  background: #ffffff;
  color: #1f2933;
  margin-right: auto;
  border: 1px solid #e5e7eb;
  box-shadow: 0 4px 12px rgba(15, 23, 42, 0.035);
  border-bottom-left-radius: 6px;
position: relative;
padding-left: 42px;
}
.assistant::before {
  content: "AI";
  position: absolute;
  left: 12px;
  top: 12px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #dbeafe;
  color: #2563eb;
  font-size: 11px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}
.typing {
  color: #6b7280;
  font-style: italic;
  box-shadow: none;
}

ol {
  padding-left: 22px;
  margin-top: 8px;
  margin-bottom: 8px;
}

li {
  margin-bottom: 7px;
}

.source-video {
  margin-top: 12px;
  padding: 9px 11px;
  background: #eef6ff;
  border: 1px solid #d7e9ff;
  border-radius: 12px;
  color: #1f4f82;
  font-size: 13px;
}

.source-note {
  margin-top: 6px;
  padding: 9px 11px;
  background: #f5f5f5;
  border: 1px solid #e7e7e7;
  border-radius: 12px;
  color: #4b5563;
  font-size: 13px;
}

.input-area {
  display: flex;
  gap: 10px;
  padding: 14px;
  border-top: 1px solid #edf0f3;
  background: #ffffff;
  flex-shrink: 0;
}

input {
  flex: 1;
  padding: 13px 15px;
  border: 1px solid #d9dee5;
  border-radius: 999px;
  outline: none;
  font-size: 14px;
}

input:focus {
  border-color: #8bbdf2;
}

.send-button {
  padding: 13px 18px;
  border: none;
  border-radius: 999px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

.send-button:hover {
  background: #1d4ed8;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>
      <div class="header-title">Kurssi-AI</div>
      <div id="headerOhjelma"></div>
    </div>
    <button class="clear-button" onclick="tyhjennaKeskustelu()">Tyhjennä</button>
  </div>

  <div id="chat">
    <div id="welcome" class="welcome">
      <h2>Kysy apua 👋</h2>
      <p>Valitse ohjelma ja kysy kurssin sisällöstä. Voit myös aloittaa valmiilla kysymyksellä.</p>

      <div class="programs">
        <button onclick="valitseOhjelma('Word')">Word</button>
        <button onclick="valitseOhjelma('Excel')">Excel</button>
        <button onclick="valitseOhjelma('PowerPoint')">PowerPoint</button>
      </div>

      <p id="valittuOhjelma" class="selected-program">Ohjelmaa ei ole valittu.</p>

      <div class="suggestions">
<button onclick="lahetaValmisKysymys('Miten aloitan?')">Miten aloitan?</button>
<button onclick="lahetaValmisKysymys('Mistä löydän oikean toiminnon?')">Mistä löydän oikean toiminnon?</button>
<button onclick="lahetaValmisKysymys('Mitä tämä tarkoittaa?')">Mitä tämä tarkoittaa?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input id="kysymys" placeholder="Kirjoita kysymys kurssin sisällöstä...">
    <button class="send-button" onclick="lahetaKysymys()">Lähetä</button>
  </div>

</div>

<script>
let historia = [];
let valittuOhjelma = "";

function piilotaAloitusruutu() {
  const welcome = document.getElementById("welcome");

  if (welcome) {
    welcome.classList.add("hide");

    setTimeout(() => {
      welcome.remove();
    }, 300);
  }
}

function lisaaViesti(rooli, teksti, id = null) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("message");
  div.classList.add(rooli);

  if (id) {
    div.id = id;
  }

  if (rooli === "assistant") {
    div.innerHTML = muotoileVastaus(teksti);
  } else {
    div.innerText = teksti;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function naytaKirjoittaa() {
  lisaaViesti("assistant", "AI kirjoittaa...", "typing");
  document.getElementById("typing").classList.add("typing");
}

function poistaKirjoittaa() {
  const typing = document.getElementById("typing");
  if (typing) {
    typing.remove();
  }
}

function muotoileVastaus(teksti) {
  let rivit = teksti.split("\n");
  let html = "";
  let listaKaynnissa = false;

  rivit.forEach(rivi => {
    rivi = rivi.trim();

    if (!rivi) return;

    const numeroMatch = rivi.match(/^\d+\.\s/);

    if (numeroMatch) {
      if (!listaKaynnissa) {
        html += "<ol>";
        listaKaynnissa = true;
      }

      html += `<li>${rivi.replace(/^\d+\.\s/, "")}</li>`;
    } else {
      if (listaKaynnissa) {
        html += "</ol>";
        listaKaynnissa = false;
      }

      if (rivi.startsWith("Löytyy videosta:")) {
        html += `<div class="source-video">🎥 ${rivi.replace("Löytyy videosta:", "").trim()}</div>`;
      }
      else if (rivi.startsWith("Lisäohje:")) {
        html += `<div class="source-note">📘 ${rivi.replace("Lisäohje:", "").trim()}</div>`;
      }
      else {
        html += `<div>${rivi}</div>`;
      }
    }
  });

  if (listaKaynnissa) {
    html += "</ol>";
  }

  return html;
}

function valitseOhjelma(ohjelma) {
  valittuOhjelma = ohjelma;

  const valittuTeksti = document.getElementById("valittuOhjelma");
  if (valittuTeksti) {
    valittuTeksti.innerText = ohjelma
      ? "Valittu ohjelma: " + ohjelma
      : "Ohjelmaa ei ole valittu.";
  }

  document.getElementById("headerOhjelma").innerText =
    ohjelma ? ohjelma : "";

  if (historia.length > 0) {
    lisaaViesti("assistant", "Ohjelma vaihdettu: " + ohjelma);
  }
}

function tyhjennaKeskustelu() {
  historia = [];

  document.getElementById("chat").innerHTML = `
    <div id="welcome" class="welcome">
      <h2>Kysy apua 👋</h2>
      <p>Valitse ohjelma ja kysy kurssin sisällöstä. Voit myös aloittaa valmiilla kysymyksellä.</p>

      <div class="programs">
        <button onclick="valitseOhjelma('Word')">Word</button>
        <button onclick="valitseOhjelma('Excel')">Excel</button>
        <button onclick="valitseOhjelma('PowerPoint')">PowerPoint</button>
      </div>

      <p id="valittuOhjelma" class="selected-program">
        ${valittuOhjelma ? "Valittu ohjelma: " + valittuOhjelma : "Ohjelmaa ei ole valittu."}
      </p>

      <div class="suggestions">
        <button onclick="lahetaValmisKysymys('Miten jaan tiedoston?')">Miten jaan tiedoston?</button>
        <button onclick="lahetaValmisKysymys('Miten valitsen tekstiä?')">Miten valitsen tekstiä?</button>
        <button onclick="lahetaValmisKysymys('Miten muotoilen tekstiä?')">Miten muotoilen tekstiä?</button>
      </div>
    </div>
  `;
}

async function lahetaValmisKysymys(kysymys) {
  document.getElementById("kysymys").value = kysymys;
  await lahetaKysymys();
}

async function lahetaKysymys() {
  const input = document.getElementById("kysymys");
  const kysymys = input.value;

  if (!kysymys.trim()) return;

  piilotaAloitusruutu();
  lisaaViesti("user", kysymys);
  input.value = "";

  naytaKirjoittaa();

  try {
    const response = await fetch("/kysy", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        kysymys: valittuOhjelma
          ? `Ohjelma: ${valittuOhjelma}. Kysymys: ${kysymys}`
          : kysymys,
        historia: historia
      })
    });

    const data = await response.json();

    poistaKirjoittaa();

    if (data.vastaus) {
      lisaaViesti("assistant", data.vastaus);

      historia.push({ role: "user", content: kysymys });
      historia.push({ role: "assistant", content: data.vastaus });
    } else {
      lisaaViesti("assistant", "Virhe: " + data.virhe);
    }
  } catch (error) {
    poistaKirjoittaa();
    lisaaViesti("assistant", "Yhteydessä tapahtui virhe.");
  }
}

document.getElementById("kysymys").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    lahetaKysymys();
  }
});
</script>

</body>
</html>
